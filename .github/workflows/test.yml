name: Test · Unit

on:
  push:
    branches: [feat/unit-tests, main]
  pull_request:
    branches: [main, codex/runtime-ui-lifecycle-integration]

concurrency:
  group: test-unit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lifecycle-sanitizers:
    name: Lifecycle ASan and UBSan
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang libboost-all-dev libssl-dev
      - name: Run lifecycle sanitizers
        run: bash scripts/run-lifecycle-sanitizers.sh

  cpp-linux:
    name: C++ unit tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang llvm libboost-all-dev libssl-dev ripgrep iproute2

      - name: Include boundary checks
        run: bash tools/check_include_boundaries.sh

      - name: Repository architecture checks
        run: |
          python3 -m unittest tests.tooling.test_repository_layout -v
          python3 -m unittest tests.tooling.test_ci_workspace_permissions -v
          python3 -m unittest tests.tooling.test_vmux_transport_boundary -v
          python3 tools/check_repository_layout.py

      - name: Documentation governance checks
        run: |
          python3 -m unittest tests.tooling.test_check_docs -v
          python3 tools/check_docs.py

      - name: Linux namespace Route/DNS rollback
        run: |
          mkdir -p "$PWD/build/route-dns-rollback"
          sudo OPENPPP2_NAMESPACE_ARTIFACT_DIR="$PWD/build/route-dns-rollback" bash tests/integration/linux/route_dns_rollback.sh

      - name: Upload Route/DNS rollback snapshots
        uses: actions/upload-artifact@v4
        with:
          name: route-dns-rollback-snapshots
          path: build/route-dns-rollback
          retention-days: 7

      - name: MSVC project source parity
        run: bash tools/check_vcxproj_sources.sh

      - name: Configure
        run: |
          cmake -S tests/cpp -B build/test \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build/test

      - name: Runtime contract (C++)
        run: bash scripts/test-runtime-contract.sh cpp

      - name: Run tests
        run: |
          mkdir -p build/coverage
          LLVM_PROFILE_FILE="$PWD/build/coverage/%p-%m.profraw" \
            ctest --test-dir build/test --output-on-failure

      - name: Coverage report
        run: |
          shopt -s nullglob
          profraw=(build/coverage/*.profraw)
          if [ ${#profraw[@]} -eq 0 ]; then
            echo "No profraw files found"
            exit 1
          fi
          llvm-profdata merge -sparse build/coverage/*.profraw -o build/coverage/merged.profdata
          bins="build/test/p2p_replay_window_test build/test/dns_buffer_test build/test/dns_message_test build/test/dns_server_validation_test build/test/dns_wire_validation_test build/test/base64_test build/test/sysctl_validation_test"
          llvm-cov report $bins \
            -instr-profile=build/coverage/merged.profdata \
            tests/cpp common/dnslib common/base64 ppp/p2p \
            | tee build/coverage/summary.txt

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cpp-summary
          path: build/coverage/summary.txt
          retention-days: 7

  go:
    name: Go unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go/guardian
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Test
        run: |
          mkdir -p build/coverage
          go test ./... -coverprofile=build/coverage/go.out -covermode=atomic
          go tool cover -func=build/coverage/go.out | tee build/coverage/go-summary.txt
      - name: Vet and test the manager backend
        working-directory: go
        run: |
          go vet ./ppp/...
          go test ./ppp/...
      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go
          path: go/build/coverage/go-summary.txt
          retention-days: 7

  flutter:
    name: Flutter unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Test
        run: |
          flutter pub get
          bash ../scripts/test-runtime-contract.sh dart
          flutter test --coverage
          echo "Flutter tests completed" | tee coverage/flutter-summary.txt
      - name: Upload Flutter coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-flutter
          path: android/coverage/flutter-summary.txt
          retention-days: 7

  ios-simulator:
    name: iOS unit tests (simulator)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios/App
    steps:
      - uses: actions/checkout@v4
      - name: Typecheck PacketTunnel P2P provider transport
        run: |
          sdk_root="$(xcrun --sdk iphonesimulator --show-sdk-path)"
          swiftc -typecheck \
            -sdk "$sdk_root" \
            -target "$(uname -m)-apple-ios15.0-simulator" \
            -I .. \
            OpenPPP2PacketTunnel/ProviderOwnedP2PDatagramTransport.swift
      - name: Run XCTest
        run: |
          chmod +x run-tests.sh
          bash ../../scripts/test-runtime-contract.sh swift
          ./run-tests.sh
