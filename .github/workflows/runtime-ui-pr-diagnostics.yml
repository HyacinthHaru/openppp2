name: Runtime UI PR Diagnostics

on:
  pull_request:
    branches: [codex/runtime-ui-lifecycle-integration]

permissions:
  contents: read

concurrency:
  group: runtime-ui-pr-diagnostics-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  focused-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build clang libboost-all-dev libssl-dev ripgrep >/dev/null

      - name: Include boundary checks
        run: bash tools/check_include_boundaries.sh

      - name: Compile teardown translation unit
        run: |
          clang++ -std=c++17 -DFUNCTION -pthread \
            -I. -Icommon -Icommon/json/include \
            -Wno-format -Wno-deprecated-declarations \
            -fsyntax-only ppp/app/client/ClientConnectionTeardown.cpp

      - name: Configure focused tests
        run: |
          cmake -S tests/cpp -B build/runtime-diag -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build runtime snapshot test
        id: runtime-snapshot-build
        continue-on-error: true
        run: |
          cmake --build build/runtime-diag --target runtime_snapshot_test \
            > build/runtime-snapshot-build.log 2>&1

      - name: Upload runtime snapshot build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-snapshot-build-log
          path: build/runtime-snapshot-build.log
          retention-days: 7
          if-no-files-found: error

      - name: Fail after runtime snapshot diagnostic upload
        if: steps.runtime-snapshot-build.outcome == 'failure'
        run: exit 1

      - name: Build stop coordinator test
        run: cmake --build build/runtime-diag --target runtime_stop_coordinator_test

      - name: Build P2P replay test
        run: cmake --build build/runtime-diag --target p2p_replay_window_test

      - name: Run focused tests
        run: |
          ctest --test-dir build/runtime-diag \
            -R "runtime_snapshot_test|runtime_stop_coordinator_test|p2p_replay_window_test" \
            --output-on-failure
